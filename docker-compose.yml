version: '3.8'

services:
  hal-proxyd:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8080:8080"
    volumes:
      - hal-proxy-data:/app/data
      - hal-proxy-artifacts:/app/artifacts
    environment:
      - HAL_PROXY_DB=/app/data/hal-proxy.db
      - HAL_PROXY_ADDR=:8080
      - HAL_PROXY_ARTIFACTS=/app/artifacts
      - HAL_PROXY_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  hal-proxy-data:
  hal-proxy-artifacts:
