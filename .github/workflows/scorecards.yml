name: Scorecards

on: [push, workflow_dispatch]

permissions:
  contents: read

jobs:
  scorecards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ossf/scorecard-action@v2
      - uses: actions/upload-artifact@v4
        with:
          name: scorecards
          path: results.scorecard.json
