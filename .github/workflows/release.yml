name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      
      - name: Get tag version
        id: tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Run tests
        run: go test ./...
      
      - name: Build binaries
        env:
          VERSION: ${{ steps.tag.outputs.VERSION }}
        run: |
          mkdir -p release
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X main.Version=$VERSION" -o release/bridgeosd-linux-amd64 ./cmd/bridgeosd
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w -X main.Version=$VERSION" -o release/bridgeosd-darwin-amd64 ./cmd/bridgeosd
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w -X main.Version=$VERSION" -o release/bridgeosd-darwin-arm64 ./cmd/bridgeosd
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w -X main.Version=$VERSION" -o release/bridgeosd-windows-amd64.exe ./cmd/bridgeosd
      
      - name: Build Docker image
        run: |
          docker build -t bridgeos/bridgeosd:${{ steps.tag.outputs.VERSION }} -t bridgeos/bridgeosd:latest -f Dockerfile.backend .
      
      - name: Push to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Push Docker images
        run: |
          docker push bridgeos/bridgeosd:${{ steps.tag.outputs.VERSION }}
          docker push bridgeos/bridgeosd:latest
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
