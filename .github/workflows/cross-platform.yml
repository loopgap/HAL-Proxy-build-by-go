name: Cross-Platform Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Linux tests
  linux:
    name: Linux (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build on Linux
        run: |
          go build ./...
          go vet ./...

      - name: Run tests
        run: go test -race -short ./...

  # macOS tests
  macos:
    name: macOS (arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build on macOS
        run: |
          go build ./...
          go vet ./...

      - name: Run tests
        run: go test -race -short ./...

  # Windows tests
  windows:
    name: Windows (amd64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build on Windows
        shell: pwsh
        run: |
          go build ./...
          go vet ./...

      - name: Run tests
        shell: pwsh
        run: go test -race -short ./...

  # Frontend on all platforms
  frontend-linux:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install
        working-directory: ui
        run: npm ci

      - name: TypeScript check
        working-directory: ui
        run: npx tsc --noEmit

      - name: ESLint
        working-directory: ui
        run: npm run lint

      - name: Build
        working-directory: ui
        run: npm run build

  frontend-windows:
    name: Frontend (Node 20 - Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install
        shell: pwsh
        working-directory: ui
        run: npm ci

      - name: TypeScript check
        shell: pwsh
        working-directory: ui
        run: npx tsc --noEmit

      - name: ESLint
        shell: pwsh
        working-directory: ui
        run: npm run lint

      - name: Build
        shell: pwsh
        working-directory: ui
        run: npm run build
