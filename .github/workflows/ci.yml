name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Go Backend Tests
  go-test:
    name: Go Backend Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      
      - name: Download dependencies
        run: go mod download
      
      - name: Run Go tests with race detection
        run: go test -v -race -cover ./cmd/... ./internal/...
      
      - name: Build Go binaries
        run: |
          go build -o bin/bridge ./cmd/bridge
          go build -o bin/bridgeosd ./cmd/bridgeosd
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: go-binaries
          path: bin/

  # React Frontend Tests
  frontend-test:
    name: React Frontend Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      
      - name: Install dependencies
        working-directory: ui
        run: npm ci
      
      - name: Run ESLint
        working-directory: ui
        run: npm run lint
      
      - name: Run TypeScript check
        working-directory: ui
        run: npx tsc --noEmit
      
      - name: Run frontend tests
        working-directory: ui
        run: npm test -- --run
      
      - name: Build frontend
        working-directory: ui
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: ui/dist/

  # Security Scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      
      - name: Run Go security checks
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          # Run and capture output
          output=$(govulncheck ./... 2>&1) || true
          echo "$output"
          
          # Check if there are non-stdlib vulnerabilities
          if echo "$output" | grep -q "vulnerabilities in packages you import"; then
            # Check if it's only stdlib
            if echo "$output" | grep -q "0 vulnerabilities in packages you import"; then
              echo "WARNING: Go stdlib vulnerabilities found. Upgrade Go to latest patch version."
            else
              echo "ERROR: Third-party package vulnerabilities found!"
              exit 1
            fi
          fi
      
      - name: "Run npm audit"
        working-directory: ui
        run: npm audit --audit-level=critical

  # Generate Coverage Report
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [go-test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      
      - name: Generate coverage report
        run: |
          go test -race -coverprofile=coverage.out ./cmd/... ./internal/...
          go tool cover -html=coverage.out -o coverage.html
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          fail_ci_if_error: false
