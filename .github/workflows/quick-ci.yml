name: Quick CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: quick-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast Go checks
  go-quick:
    name: Go Quick Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Quick build
        run: go build -v ./...

      - name: Quick vet
        run: go vet ./...

  # Fast frontend checks
  frontend-quick:
    name: Frontend Quick Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install
        working-directory: ui
        run: npm ci

      - name: TypeScript check
        working-directory: ui
        run: npx tsc --noEmit

      - name: ESLint
        working-directory: ui
        run: npm run lint

  # Fast security checks
  security-quick:
    name: Security Quick Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Go vul check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || true

      - name: NPM audit
        working-directory: ui
        run: npm audit --audit-level=high || true
