name: Auto Merge Dependabot

on: pull_request

permissions:
  contents: read

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4
      - uses: aamarj/semver-pr-merge-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          semver_version: patch
