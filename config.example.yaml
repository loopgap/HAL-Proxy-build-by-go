# BridgeOS 配置文件示例
# 注意：此文件使用 key=value 格式，每行一个配置项

# 服务器配置
server.address=:8080
server.read_timeout=30
server.write_timeout=30
server.idle_timeout=120
server.max_body_size=1048576
server.request_timeout=30

# 数据库配置
database.path=bridgeos.db
database.max_open_conns=25
database.max_idle_conns=5

# 应用配置
app.name=BridgeOS
app.version=0.2.3
app.environment=development
app.artifacts_dir=artifacts

# 日志配置
log.level=info
log.format=json
log.output=stdout
log.file_path=

# 认证配置
auth.jwt_secret=your-secret-key-here
auth.jwt_expiry_hours=24
auth.jwt_issuer=bridgeos
auth.local_trusted=true

# 限流配置
rate_limit.enabled=true
rate_limit.requests_per_minute=60
rate_limit.burst_size=10
